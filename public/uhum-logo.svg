<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="18" fill="#0f1a2e"/>
  <!-- Meditating figure: single continuous line path -->
  <!-- Head -->
  <ellipse cx="50" cy="22" rx="8" ry="9" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Body / torso curve -->
  <path
    d="M 50 31
       C 50 38, 38 40, 34 48
       C 30 56, 32 60, 50 62
       C 68 60, 70 56, 66 48
       C 62 40, 50 38, 50 31"
    fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crossed legs - infinity-like shape -->
  <path
    d="M 34 62
       C 20 64, 16 72, 22 76
       C 28 80, 38 76, 50 76
       C 62 76, 72 80, 78 76
       C 84 72, 80 64, 66 62"
    fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Inner leg crease -->
  <path
    d="M 38 74 C 44 70, 56 70, 62 74"
    fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
